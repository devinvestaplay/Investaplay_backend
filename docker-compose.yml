version: '3.9'

services:
  postgres:
    container_name: ${PROJECT_NAME}_postgres
    image: postgres:16.4-alpine
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    env_file:
      - .env
    expose:
      - "8080"
      - "5432"
    ports:
      - "5432:5432"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - ../data:/var/lib/postgresql/data

  nakama:
    build: .
    container_name: ${PROJECT_NAME}_nakama
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up \
          --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/nakama?sslmode=disable \
        && exec /nakama/nakama \
          --config /nakama/data/base_config.yml \
          --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/nakama?sslmode=disable
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 5
    links:
      - "postgres:db"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
      - "9200:9200"
    restart: unless-stopped

volumes:
  data-prod:
